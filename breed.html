<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>품종별 종특 DB — 테베리디</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fffdf9;
    --surface: #ffffff;
    --border: #ede8e0;
    --border-active: #2d6a4f;
    --text: #1c1a17;
    --text-muted: #6b6458;
    --text-dim: #a89e92;
    --green: #2d6a4f;
    --green-light: #40916c;
    --green-pale: #d8f3dc;
    --orange: #e07b39;
    --orange-pale: #fdebd0;
    --red: #c0392b;
    --red-pale: #fdecea;
    --blue: #2563eb;
    --blue-pale: #dbeafe;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    font-size: 17px;
    line-height: 1.8;
    padding-bottom: 80px;
  }

  nav {
    position: sticky;
    top: 0; z-index: 100;
    background: rgba(255,253,249,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 600; color: var(--green); text-decoration: none; }
  .nav-logo span { color: var(--text); }
  .nav-back { font-size: 14px; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .nav-back:hover { color: var(--green); }

  .page-header {
    background: var(--green);
    padding: 44px 24px;
    text-align: center;
  }

  .page-header-badge {
    display: inline-block;
    background: rgba(255,255,255,0.18);
    color: white;
    padding: 5px 16px;
    border-radius: 100px;
    font-size: 13px;
    margin-bottom: 14px;
  }

  .page-header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(22px, 4vw, 34px);
    font-weight: 600;
    color: white;
    margin-bottom: 10px;
  }

  .page-header p {
    font-size: 15px;
    color: rgba(255,255,255,0.75);
    max-width: 480px;
    margin: 0 auto;
  }

  .wrap { max-width: 900px; margin: 0 auto; padding: 40px 24px 0; }

  /* 검색 */
  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .search-input {
    flex: 1;
    padding: 14px 18px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    outline: none;
    background: white;
    color: var(--text);
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--border-active); }

  /* 카테고리 */
  .category-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .cat-tab {
    padding: 8px 18px;
    border: 1.5px solid var(--border);
    border-radius: 100px;
    font-size: 14px;
    color: var(--text-muted);
    cursor: pointer;
    background: white;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }

  .cat-tab:hover { border-color: var(--green); color: var(--green); }
  .cat-tab.active { border-color: var(--green); background: var(--green-pale); color: var(--green); font-weight: 500; }

  /* 품종 카드 그리드 */
  .breed-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }

  .breed-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s;
  }

  .breed-card:hover {
    border-color: var(--green);
    box-shadow: 0 4px 20px rgba(45,106,79,0.12);
    transform: translateY(-2px);
  }

  .breed-card-top {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
  }

  .breed-emoji { font-size: 32px; margin-bottom: 8px; }

  .breed-name {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }

  .breed-eng { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }

  .breed-tags { display: flex; flex-wrap: wrap; gap: 5px; }

  .breed-tag {
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 100px;
    background: var(--green-pale);
    color: var(--green);
  }

  .breed-tag.warn {
    background: var(--orange-pale);
    color: #9a4f10;
  }

  .breed-card-body { padding: 14px 20px; }

  .breed-summary {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 12px;
  }

  .breed-disease-list {
    list-style: none;
  }

  .breed-disease-list li {
    font-size: 13px;
    color: var(--text-muted);
    padding: 3px 0 3px 16px;
    position: relative;
    line-height: 1.5;
  }

  .breed-disease-list li::before {
    content: '•';
    position: absolute;
    left: 4px;
    color: var(--orange);
  }

  .breed-more {
    display: inline-block;
    margin-top: 10px;
    font-size: 13px;
    color: var(--green);
    cursor: pointer;
    font-weight: 500;
  }

  /* 상세 모달 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 500;
    overflow-y: auto;
    padding: 24px;
  }

  .modal-overlay.show { display: flex; align-items: flex-start; justify-content: center; }

  .modal {
    background: white;
    border-radius: 16px;
    width: 100%;
    max-width: 680px;
    margin: auto;
    overflow: hidden;
    animation: modalIn 0.3s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .modal-header {
    background: var(--green);
    padding: 24px 28px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .modal-title-group { flex: 1; }

  .modal-emoji { font-size: 36px; margin-bottom: 6px; }

  .modal-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 24px;
    font-weight: 600;
    color: white;
    margin-bottom: 2px;
  }

  .modal-eng { font-size: 14px; color: rgba(255,255,255,0.65); }

  .modal-close {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    font-size: 20px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .modal-close:hover { background: rgba(255,255,255,0.3); }

  .modal-body { padding: 28px; }

  .modal-section { margin-bottom: 24px; }

  .modal-section-title {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--green-pale);
  }

  .modal-text { font-size: 15px; color: var(--text-muted); line-height: 1.8; }

  /* 정상 vs 병원 구분 표 */
  .check-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  .check-table th {
    padding: 10px 14px;
    text-align: left;
    font-weight: 500;
    font-size: 13px;
  }

  .check-table th:first-child { background: var(--green-pale); color: var(--green); border-radius: 6px 0 0 0; }
  .check-table th:last-child  { background: var(--red-pale);   color: var(--red);   border-radius: 0 6px 0 0; }

  .check-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    line-height: 1.6;
  }

  .check-table td:first-child { color: var(--green); border-right: 1px solid var(--border); }
  .check-table td:last-child  { color: var(--red); }

  /* 위험도 바 */
  .risk-bars { display: flex; flex-direction: column; gap: 10px; }

  .risk-row { display: flex; align-items: center; gap: 12px; }

  .risk-label { font-size: 13px; color: var(--text-muted); min-width: 80px; }

  .risk-bar-bg {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .risk-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .risk-level { font-size: 12px; color: var(--text-dim); min-width: 24px; text-align: right; }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-dim);
    grid-column: 1 / -1;
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 16px; }

  @media (max-width: 600px) {
    .breed-grid { grid-template-columns: 1fr; }
    .modal-overlay { padding: 12px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">테베리<span>디</span></a>
  <a href="index.html" class="nav-back">← 홈으로</a>
</nav>

<div class="page-header">
  <div class="page-header-badge">🐕 품종 정보</div>

  <p>우리 아이가 원래 이런 건지, 병원 가야 하는 건지.<br>병원이 굳이 안 알려주는 정보를 정리했습니다.</p>
</div>

<div class="wrap">
  <div class="search-row">
    <input type="text" class="search-input" id="searchInput"
      placeholder="품종명 검색 (예: 말티푸, 포메, 프렌치불독)"
      oninput="filterBreeds()">
  </div>

  <div class="category-tabs">
    <button class="cat-tab active" onclick="selectCat('전체', this)">전체</button>
    <button class="cat-tab" onclick="selectCat('소형견', this)">🐩 소형견</button>
    <button class="cat-tab" onclick="selectCat('중형견', this)">🐕 중형견</button>
    <button class="cat-tab" onclick="selectCat('대형견', this)">🦮 대형견</button>
    <button class="cat-tab" onclick="selectCat('고양이', this)">🐱 고양이</button>
  </div>

  <div class="breed-grid" id="breedGrid"></div>
</div>

<!-- 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-emoji" id="mEmoji"></div>
        <div class="modal-name" id="mName"></div>
        <div class="modal-eng" id="mEng"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

let currentCat  = '전체';
let currentSearch = '';

function selectCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderBreeds();
}

function filterBreeds() {
  currentSearch = document.getElementById('searchInput').value.trim();
  renderBreeds();
}

function renderBreeds() {
  const grid = document.getElementById('breedGrid');

  let list = BREEDS;
  if (currentCat !== '전체') list = list.filter(b => b.category === currentCat);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    list = list.filter(b =>
      b.name.includes(q) ||
      b.eng.toLowerCase().includes(q) ||
      b.diseases.some(d => d.includes(q)) ||
      b.tags.some(t => t.includes(q))
    );
  }

  if (list.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="icon">🐾</div>
        <p>검색 결과가 없습니다.<br>다른 품종명으로 검색해보세요.</p>
      </div>`;
    return;
  }

  grid.innerHTML = list.map(b => `
    <div class="breed-card" onclick="openModal(${b.id})">
      <div class="breed-card-top">
        <div class="breed-emoji">${b.emoji}</div>
        <div class="breed-name">${b.name}</div>
        <div class="breed-eng">${b.eng}</div>
        <div class="breed-tags">
          ${b.tags.map(t => `<span class="breed-tag">${t}</span>`).join('')}
          ${b.warn_tags.map(t => `<span class="breed-tag warn">⚠️ ${t}</span>`).join('')}
        </div>
      </div>
      <div class="breed-card-body">
        <div class="breed-summary">${b.summary}</div>
        <div style="font-size:12px;font-weight:500;color:var(--text-dim);margin-bottom:6px;letter-spacing:0.05em">주의 질환</div>
        <ul class="breed-disease-list">
          ${b.diseases.slice(0, 3).map(d => `<li>${d}</li>`).join('')}
        </ul>
        <span class="breed-more">자세히 보기 →</span>
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  const b = BREEDS.find(x => x.id === id);
  if (!b) return;

  document.getElementById('mEmoji').textContent = b.emoji;
  document.getElementById('mName').textContent  = b.name;
  document.getElementById('mEng').textContent   = b.eng;

  const riskBars = Object.entries(b.risks).map(([label, val]) => {
    const color = val >= 80 ? '#c0392b' : val >= 65 ? '#e07b39' : '#2d6a4f';
    return `
      <div class="risk-row">
        <span class="risk-label">${label}</span>
        <div class="risk-bar-bg">
          <div class="risk-bar-fill" style="width:${val}%;background:${color}"></div>
        </div>
        <span class="risk-level">${val}</span>
      </div>`;
  }).join('');

  const checkRows = b.normal.map(r => `
    <tr>
      <td>✅ ${r.normal}</td>
      <td>🚨 ${r.abnormal}</td>
    </tr>`).join('');

  document.getElementById('mBody').innerHTML = `
    <div class="modal-section">
      <div class="modal-section-title">품종 특성</div>
      <div class="modal-text">${b.summary}</div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">질환 위험도</div>
      <div class="risk-bars">${riskBars}</div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">정상 vs 병원 가야 할 때</div>
      <table class="check-table">
        <thead>
          <tr>
            <th>✅ 정상 (이건 괜찮아요)</th>
            <th>🚨 병원 가야 해요</th>
          </tr>
        </thead>
        <tbody>${checkRows}</tbody>
      </table>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">관리 포인트</div>
      <div class="modal-text">${b.care}</div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title" style="color:var(--orange)">⚠️ 병원에서 알아야 할 것</div>
      <div class="modal-text" style="background:var(--orange-pale);padding:16px;border-radius:8px;color:#9a4f10">
        ${b.vet_note}
      </div>
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

renderBreeds();
</script>
