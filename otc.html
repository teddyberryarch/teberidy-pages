<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTC 약품 비교 — 테베리디</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fffdf9;
    --surface: #ffffff;
    --border: #ede8e0;
    --border-active: #2d6a4f;
    --text: #1c1a17;
    --text-muted: #6b6458;
    --text-dim: #a89e92;
    --green: #2d6a4f;
    --green-light: #40916c;
    --green-pale: #d8f3dc;
    --orange: #e07b39;
    --orange-pale: #fdebd0;
    --red: #c0392b;
    --red-pale: #fdecea;
    --blue: #2563eb;
    --blue-pale: #dbeafe;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    font-size: 19px;
    line-height: 1.8;
    padding-bottom: 80px;
  }

  nav {
    position: sticky;
    top: 0; z-index: 100;
    background: rgba(255,253,249,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--green);
    text-decoration: none;
  }

  .nav-logo span { color: var(--text); }
  .nav-back { font-size: 18px; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .nav-back:hover { color: var(--green); }

  .page-header {
    background: var(--green);
    padding: 44px 24px;
    text-align: center;
  }

  .page-header-badge {
    display: inline-block;
    background: rgba(255,255,255,0.18);
    color: white;
    padding: 5px 16px;
    border-radius: 100px;
    font-size: 17px;
    margin-bottom: 14px;
  }

  .page-header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(22px, 4vw, 34px);
    font-weight: 600;
    color: white;
    margin-bottom: 10px;
  }

  .page-header p {
    font-size: 17px;
    color: rgba(255,255,255,0.75);
    max-width: 480px;
    margin: 0 auto;
  }

  .wrap { max-width: 860px; margin: 0 auto; padding: 40px 24px 0; }

  /* 검색 */
  .search-section {
    margin-bottom: 36px;
  }

  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .search-input {
    flex: 1;
    padding: 14px 18px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 18px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    outline: none;
    background: white;
    color: var(--text);
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--border-active); }

  .btn-search {
    padding: 14px 22px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 17px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .btn-search:hover { background: var(--green-light); }

  /* 증상 카테고리 */
  .category-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    padding: 7px 16px;
    border: 1.5px solid var(--border);
    border-radius: 100px;
    font-size: 18px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    background: white;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .chip:hover { border-color: var(--green); color: var(--green); }
  .chip.active { border-color: var(--green); background: var(--green-pale); color: var(--green); font-weight: 500; }

  /* 안내 배너 */
  .info-banner {
    background: var(--orange-pale);
    border: 1px solid #f4c08a;
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 28px;
    font-size: 18px;
    color: #9a4f10;
    line-height: 1.7;
  }

  /* 약품 카드 */
  .drug-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  .drug-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: all 0.2s;
  }

  .drug-card:hover {
    border-color: var(--green);
    box-shadow: 0 4px 16px rgba(45,106,79,0.1);
    transform: translateY(-2px);
  }

  .drug-card-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
  }

  .drug-name-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 6px;
  }

  .drug-name {
    font-size: 19px;
    font-weight: 500;
    color: var(--text);
  }

  .drug-badge {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 100px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge-otc    { background: var(--green-pale);  color: var(--green); }
  .badge-rx     { background: var(--red-pale);    color: var(--red); }
  .badge-food   { background: var(--blue-pale);   color: var(--blue); }

  .drug-ingredient {
    font-size: 17px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .drug-use {
    font-size: 18px;
    color: var(--text);
    line-height: 1.6;
  }

  .drug-card-body { padding: 16px 20px; }

  .drug-section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
    margin-top: 14px;
  }

  .drug-section-label:first-child { margin-top: 0; }

  /* 제품 비교 테이블 */
  .product-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 18px;
    margin-bottom: 4px;
  }

  .product-table th {
    background: var(--bg);
    padding: 8px 10px;
    text-align: left;
    font-weight: 500;
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
  }

  .product-table td {
    padding: 10px 10px;
    border-bottom: 1px solid #f5f2ec;
    vertical-align: middle;
  }

  .product-table tr:last-child td { border-bottom: none; }

  .product-name { font-weight: 400; color: var(--text); }
  .product-price { font-weight: 500; color: var(--green); white-space: nowrap; }
  .product-note { font-size: 12px; color: var(--text-dim); }

  .best-tag {
    display: inline-block;
    background: var(--green-pale);
    color: var(--green);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 100px;
    margin-left: 4px;
    font-weight: 500;
  }

  /* 주의사항 */
  .warning-list { list-style: none; padding: 0; }

  .warning-list li {
    font-size: 17px;
    color: var(--text-muted);
    padding: 4px 0 4px 16px;
    position: relative;
    line-height: 1.6;
  }

  .warning-list li::before {
    content: '⚠️';
    position: absolute;
    left: 0;
    font-size: 11px;
    top: 5px;
  }

  .danger-list li::before { content: '🚫'; }

  /* 구매 링크 */
  .buy-links {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .btn-buy {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 17px;
    font-weight: 500;
    text-decoration: none;
    transition: opacity 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    border: none;
  }

  .btn-buy:hover { opacity: 0.85; }
  .btn-pharmacy { background: #03c75a; color: white; }
  .btn-naver-map { background: #f4c542; color: #1c1a17; }

  /* 없는 결과 */
  .empty-result {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-dim);
  }

  .empty-result .icon { font-size: 40px; margin-bottom: 16px; }
  .empty-result p { font-size: 17px; line-height: 1.8; }

  /* 섹션 타이틀 */
  .section-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--green-pale);
  }

  @media (max-width: 600px) {
    .drug-grid { grid-template-columns: 1fr; }
    .search-row { flex-direction: column; }
  }
</style>
</head>

<nav>

  <div class="drug-grid" id="drugGrid"></div>

</div>

let currentCategory = '전체';
let currentSearch   = '';

function selectCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderDrugs();
}

function filterDrugs() {
  currentSearch = document.getElementById('searchInput').value.trim().toLowerCase();
  renderDrugs();
}

function renderDrugs() {
  const grid = document.getElementById('drugGrid');
  const title = document.getElementById('resultTitle');

  let filtered = DRUGS;

  if (currentCategory !== '전체') {
    filtered = filtered.filter(d => d.category === currentCategory);
  }

  if (currentSearch) {
    filtered = filtered.filter(d =>
      d.name.includes(currentSearch) ||
      d.ingredient.toLowerCase().includes(currentSearch) ||
      d.use.includes(currentSearch) ||
      (d.search_tags || []).some(t => t.includes(currentSearch))
    );
  }

  title.textContent = currentSearch
    ? `"${currentSearch}" 검색 결과 ${filtered.length}건`
    : currentCategory === '전체'
      ? `전체 약품 정보 (${filtered.length}종)`
      : `${currentCategory} 관련 약품 (${filtered.length}종)`;

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-result" style="grid-column:1/-1">
        <div class="icon">💊</div>
        <p>검색 결과가 없습니다.<br>다른 키워드로 검색해보세요.<br><br>
        <small style="color:var(--text-dim)">예: 설사, 가려움, 관절, 기생충</small></p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(drug => `
    <div class="drug-card">
      <div class="drug-card-header">
        <div class="drug-name-row">
          <div class="drug-name">${drug.name}</div>
          <span class="drug-badge ${drug.otc ? 'badge-otc' : 'badge-rx'}">
            ${drug.otc ? '✓ OTC 구매가능' : '처방 필요'}
          </span>
        </div>
        <div class="drug-ingredient">${drug.ingredient}</div>
        <div class="drug-use">${drug.use}</div>
      </div>
      <div class="drug-card-body">

        <div class="drug-section-label">제품 비교 (가격 순)</div>
        <table class="product-table">
          <thead>
            <tr>
              <th>제품명</th>
              <th>가격</th>
              <th>비고</th>
            </tr>
          </thead>
          <tbody>
            ${drug.products.map(p => `
              <tr>
                <td class="product-name">
                  ${p.name}
                  ${p.best ? '<span class="best-tag">추천</span>' : ''}
                </td>
                <td class="product-price">${p.price}</td>
                <td class="product-note">${p.note}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>

        ${drug.warnings.length > 0 ? `
          <div class="drug-section-label">주의사항</div>
          <ul class="warning-list">
            ${drug.warnings.map(w => `<li>${w}</li>`).join('')}
          </ul>
        ` : ''}

        ${drug.dangers.length > 0 ? `
          <div class="drug-section-label" style="color:var(--red)">절대 금지</div>
          <ul class="warning-list danger-list">
            ${drug.dangers.map(d => `<li style="color:var(--red)">${d}</li>`).join('')}
          </ul>
        ` : ''}

        <div class="drug-section-label">구매 안내</div>
        <div class="buy-links">
          <button class="btn-buy btn-pharmacy"
            onclick="findPharmacy('${drug.name.split('(')[0].trim()}')">
            🏪 동물약국 찾기 (네이버지도)
          </button>
        </div>
        <div style="font-size:14px;color:var(--text-dim);margin-top:8px">
          ⚠️ 동물용 의약품은 온라인 판매가 불법입니다. 반드시 동물약국 또는 동물병원에서 구매하세요.
        </div>

      </div>
    </div>
  `).join('');
}

function findPharmacy(keyword) {
  const query = encodeURIComponent('동물약국 ' + keyword);
  window.open(`https://map.naver.com/v5/search/${query}`, '_blank');
}

// 초기 렌더
renderDrugs();
